name: Build FRP for Android JNI

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - arm64-v8a        # 主流手机
          - armeabi-v7a       # 旧安卓
          - x86               # 模拟器
          - x86_64            # 64位模拟器

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Install Android NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y android-ndk

      - name: Build JNI .so for ${{ matrix.arch }}
        run: |
          # 架构对应配置
          case ${{ matrix.arch }} in
            arm64-v8a)
              export GOARCH=arm64
              export GOOS=android
              export CGO_ENABLED=1
              export CC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
              ;;
            armeabi-v7a)
              export GOARCH=arm
              export GOOS=android
              export CGO_ENABLED=1
              export GOARM=7
              export CC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
              ;;
            x86)
              export GOARCH=386
              export GOOS=android
              export CGO_ENABLED=1
              export CC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android21-clang
              ;;
            x86_64)
              export GOARCH=amd64
              export GOOS=android
              export CGO_ENABLED=1
              export CC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang
              ;;
          esac

          # 创建输出目录
          mkdir -p build/${{ matrix.arch }}
          
          # 编译 JNI 共享库
          go build -ldflags "-s -w" -buildmode=c-shared -o build/${{ matrix.arch }}/libfrp.so

      - name: Upload libraries
        uses: actions/upload-artifact@v4
        with:
          name: frp-android-jni-${{ matrix.arch }}
          path: build/${{ matrix.arch }}/
