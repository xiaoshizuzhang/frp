name: Build FRP Android JNI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ arm64-v8a, armeabi-v7a ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      # 下载并配置 Android NDK（修复无法找到 android-ndk 包的问题）
      - name: Setup Android NDK
        run: |
          NDK_VERSION="26b"
          NDK_ZIP="android-ndk-r${NDK_VERSION}-linux-x86_64.zip"
          wget -q https://dl.google.com/android/repository/${NDK_ZIP}
          unzip -q ${NDK_ZIP}
          echo "ANDROID_NDK_HOME=${GITHUB_WORKSPACE}/android-ndk-r${NDK_VERSION}" >> $GITHUB_ENV

      - name: Build for ${{ matrix.arch }}
        run: |
          NDK_BIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p build/${{ matrix.arch }}

          if [ "${{ matrix.arch }}" = "arm64-v8a" ]; then
            export GOOS=android GOARCH=arm64 CGO_ENABLED=1
            export CC=$NDK_BIN/aarch64-linux-android21-clang
            export CXX=$NDK_BIN/aarch64-linux-android21-clang++
          elif [ "${{ matrix.arch }}" = "armeabi-v7a" ]; then
            export GOOS=android GOARCH=arm CGO_ENABLED=1 GOARM=7
            export CC=$NDK_BIN/armv7a-linux-androideabi21-clang
            export CXX=$NDK_BIN/armv7a-linux-androideabi21-clang++
          fi

          go build -ldflags "-s -w" -buildmode=c-shared -o build/${{ matrix.arch }}/libfrp.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frp-jni-${{ matrix.arch }}
          path: build/${{ matrix.arch }}/
