name: Build FRP Android JNI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c
          link-to-sdk: true

      - name: Build arm64-v8a
        run: |
          mkdir -p build/arm64-v8a
          export GOOS=android GOARCH=arm64 CGO_ENABLED=1
          export CC=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          go build -ldflags "-s -w" -buildmode=c-shared -o build/arm64-v8a/libfrp.so

      - name: Build armeabi-v7a
        run: |
          mkdir -p build/armeabi-v7a
          export GOOS=android GOARCH=arm CGO_ENABLED=1 GOARM=7
          export CC=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          go build -ldflags "-s -w" -buildmode=c-shared -o build/armeabi-v7a/libfrp.so

      - name: Upload all
        uses: actions/upload-artifact@v4
        with:
          name: frp-jni-all
          path: build/
